<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: black; }
        canvas { border: 2px solid white; }
        #scoreboard { color: white; font-size: 24px; position: absolute; top: 20px; }
    </style>
</head>
<body>
    <div id="scoreboard">Player: 0 | AI: 0</div>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("pong");
        const context = canvas.getContext("2d");

        // Create the pong paddle
        const paddleWidth = 10, paddleHeight = 100;

        const player = {
            x: 0,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: "white",
            score: 0
        };

        const computer = {
            x: canvas.width - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: "red",
            score: 0
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speed: 4,
            velocityX: 4,
            velocityY: 4,
            color: "white"
        };

        function drawRect(x, y, width, height, color) {
            context.fillStyle = color;
            context.fillRect(x, y, width, height);
        }

        function drawArc(x, y, radius, color) {
            context.fillStyle = color;
            context.beginPath();
            context.arc(x, y, radius, 0, Math.PI * 2, false);
            context.closePath();
            context.fill();
        }

        function draw() {
            drawRect(0, 0, canvas.width, canvas.height, "black");
            drawRect(player.x, player.y, player.width, player.height, player.color);
            drawRect(computer.x, computer.y, computer.width, computer.height, computer.color);
            drawArc(ball.x, ball.y, ball.radius, ball.color);
            document.getElementById("scoreboard").innerText = `Player: ${player.score} | AI: ${computer.score}`;
        }

        function update() {
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.velocityY = -ball.velocityY;
            }
            let paddle = (ball.x < canvas.width / 2) ? player : computer;
            if (ball.x - ball.radius < paddle.x + paddle.width && ball.x + ball.radius > paddle.x && ball.y > paddle.y && ball.y < paddle.y + paddle.height) {
                ball.velocityX = -ball.velocityX;
            }
            if (ball.x - ball.radius < 0) {
                computer.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                player.score++;
                resetBall();
            }
            computer.y += ((ball.y - (computer.y + computer.height / 2))*0.09);
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = -ball.velocityX;
        }

        function gameLoop() {
            draw();
            update();
            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener("mousemove", (event) => {
            let rect = canvas.getBoundingClientRect();
            player.y = event.clientY - rect.top - player.height / 2;
        });

        document.addEventListener("keydown", (event) => {
            switch(event.key) {
                case "ArrowUp":
                    if (player.y > 0) player.y -= 20;
                    break;
                case "ArrowDown":
                    if (player.y < canvas.height - player.height) player.y += 20;
                    break;
            }
        });

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
